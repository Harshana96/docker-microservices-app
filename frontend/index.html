<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 20px; }
    .container { background: white; border-radius: 12px; padding: 32px; width: 100%; max-width: 520px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; margin-bottom: 24px; color: #1a1a1a; }
    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #4f46e5; }
    button.add { padding: 10px 18px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button.add:hover { background: #4338ca; }
    .task { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .task span { font-size: 14px; color: #333; }
    button.del { background: none; border: none; color: #ef4444; font-size: 18px; cursor: pointer; padding: 0 4px; }
    button.del:hover { color: #dc2626; }
    .empty { text-align: center; color: #aaa; font-size: 14px; padding: 24px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Manager V2</h1>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button class="add" onclick="addTask()">Add</button>
    </div>
    <div id="taskList"></div>
  </div>

  <script>
    const API = 'http://' + window.location.hostname + ':5000';

    async function loadTasks() {
      const res = await fetch(API + '/tasks');
      const tasks = await res.json();
      const list = document.getElementById('taskList');
      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty">No tasks yet. Add one above!</div>';
        return;
      }
      list.innerHTML = tasks.map(t => `
        <div class="task">
          <span>${t.title}</span>
          <button class="del" onclick="deleteTask(${t.id})">x</button>
        </div>
      `).join('');
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return;
      await fetch(API + '/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(API + '/tasks/' + id, { method: 'DELETE' });
      loadTasks();
    }

    document.getElementById('taskInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
